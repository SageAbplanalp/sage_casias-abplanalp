<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | Cat Breeds of the World</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
  <header>
    <h1 class="logo">Cat Breeds of the World</h1>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="breeds.html">Breeds</a></li>
        <li><a href="spotlight.html">Spotlight</a></li>
        <li><a href="care.html">Care Tips</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Contact Us</h2>
    <p>Have a question or want to share your favorite breed?</p>

    <form action="#" method="post">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>

      <label for="breed">Favorite Breed</label>
      <select id="breed" name="breed">
        <option value="mainecoon">Maine Coon</option>
        <option value="bengal">Bengal</option>
        <option value="persian">Persian</option>
        <option value="ragdoll">Ragdoll</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="5"></textarea>

      <button type="submit">Send</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Cat Breeds of the World</p>
  </footer>
</body>
</html>
