<!DOCTYPE html>
<html lang="en">

<head>

<title>Bando Mods - Tracking Orders</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<link rel="stylesheet" href="../styles/styles.css">

</head>

<body>


<header class="header">

<h1>Bando Mods</h1>

<p>Track or Check Your Order</p>
<p>
<a href="../pages/index.html">Return to Homepage</a>
</p>
</header>


<main class="main-content">

<div class="form-container">

<form id="orderTrackingForm">

<section class="form-group">

<h2>Customer Information</h2>

<label for="name">Full Name</label>
<input type="text" id="name" name="name" required>

<label for="email">Email Address</label>
<input type="email" id="email" name="email" required>

</section>

<section class="form-group">

<h2>Order Details</h2>

<label for="orderNum">Order Number</label>
<input type="text" id="orderNumb" name="orderNum" required placeholder="Example: BM-092004">

<label for="product">Product Ordered</label>
<select id="product" name="product">

<option value="">Select Product type</option>
<option value="mp3mod">Sony Walkman Mod</option>
<option value="pspmod">PlayStation Portable Mod</option>
<option value="3dsmod">Nintendo 3DS Mod</option>
<option value="stereo">Retro Pioneer Bluetooth modded Stereo</option>

</select>

</section>


<section class="form-group">
<h2>Order Status Request</h2>
<label for="message">Additional Questions</label>
<textarea id="message" name="message" rows="4"
placeholder="Optional message regarding order"></textarea>

</section>



<section class="form-group">

<label>
<input type="checkbox" name="updates">
Send me email updates about order?
</label>

</section>

<div class="button-container">

<button type="submit">Check Order</button>

</div>
</form>
</div>
</main>

<footer class="footer">

<p>Contact Support</p>
<p>Want to PLACE an order? Visit <a href="../pages/store.html">store</a> to place!
</p>

</footer>
</body>

</html>
